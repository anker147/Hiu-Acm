<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIU-ACM 假期算法集训管理系统</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="view-login" class="view"></div>
<div id="view-dashboard" class="view hidden"></div>
<div id="view-admin" class="view hidden"></div>

<div class="custom-cursor" id="customCursor"></div>
<div class="cursor-trail" id="cursorTrail"></div>

<div class="bg-particles" id="bgParticles">
  <canvas id="particleCanvas"></canvas>
</div>

<script src="js/problems.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/admin.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  initCursor();
  initParticles();
  try {
    await App.init();
  } catch (e) {
    console.error("Init error:", e);
    App.showView("login");
  }
});

function initCursor() {
  const cursor = document.getElementById("customCursor");
  const trail = document.getElementById("cursorTrail");
  const dots = [];
  for (let i = 0; i < 6; i++) {
    const dot = document.createElement("div");
    dot.className = "trail-dot";
    trail.appendChild(dot);
    dots.push({ el: dot, x: 0, y: 0 });
  }
  let mouseX = 0, mouseY = 0;
  document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    cursor.style.left = mouseX + "px";
    cursor.style.top = mouseY + "px";
  });
  function animate() {
    let prevX = mouseX, prevY = mouseY;
    dots.forEach((dot, i) => {
      const targetX = i === 0 ? mouseX : dots[i - 1].x;
      const targetY = i === 0 ? mouseY : dots[i - 1].y;
      dot.x += (targetX - dot.x) * (0.35 - i * 0.04);
      dot.y += (targetY - dot.y) * (0.35 - i * 0.04);
      dot.el.style.left = dot.x + "px";
      dot.el.style.top = dot.y + "px";
      dot.el.style.opacity = 0.7 - i * 0.1;
      dot.el.style.width = (8 - i) + "px";
      dot.el.style.height = (8 - i) + "px";
    });
    requestAnimationFrame(animate);
  }
  animate();
  document.addEventListener("mouseleave", () => { cursor.style.opacity = "0"; });
  document.addEventListener("mouseenter", () => { cursor.style.opacity = "1"; });
}

function initParticles() {
  const canvas = document.getElementById("particleCanvas");
  const ctx = canvas.getContext("2d");
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);
  const particles = [];
  for (let i = 0; i < 40; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 3 + 1,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -Math.random() * 0.4 - 0.1,
      opacity: Math.random() * 0.15 + 0.05
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
      if (p.x < -10) p.x = canvas.width + 10;
      if (p.x > canvas.width + 10) p.x = -10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(45, 212, 191, ${p.opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
</html>
