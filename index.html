<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>HIU-ACM 假期算法集训管理系统</title>
  <link rel="stylesheet" href="css/style.css?v=20260628c">
</head>

<body>
  <div id="view-login" class="view"></div>
  <div id="view-dashboard" class="view hidden"></div>
  <div id="view-admin" class="view hidden"></div>

  <div class="custom-cursor" id="customCursor"></div>
  <div class="cursor-trail" id="cursorTrail"></div>

  <div class="bg-particles" id="bgParticles">
    <canvas id="particleCanvas"></canvas>
  </div>

  <script src="js/problems.js?v=20260628c"></script>
  <script src="js/fingerprint.js?v=20260628c"></script>
  <script src="js/api.js?v=20260628c"></script>
  <script src="js/auth.js?v=20260628c"></script>
  <script src="js/app.js?v=20260628c"></script>
  <script src="js/admin.js?v=20260628c"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      initCursor();
      initParticles();
      try {
        await App.init();
      } catch (e) {
        console.error("Init error:", e);
        App.showView("login");
      }
    });

    function initCursor() {
      // 触屏设备无鼠标，禁用自定义光标并恢复默认光标，避免 JS 异常时桌面端光标消失
      const isCoarse = window.matchMedia('(pointer: coarse)').matches;
      const cursor = document.getElementById("customCursor");
      const trail = document.getElementById("cursorTrail");
      if (isCoarse) {
        document.body.style.cursor = "auto";
        if (cursor) cursor.style.display = "none";
        if (trail) trail.style.display = "none";
        return;
      }
      const dots = [];
      for (let i = 0; i < 6; i++) {
        const dot = document.createElement("div");
        dot.className = "trail-dot";
        trail.appendChild(dot);
        dots.push({ el: dot, x: 0, y: 0 });
      }
      let mouseX = 0, mouseY = 0;
      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        cursor.style.left = mouseX + "px";
        cursor.style.top = mouseY + "px";
      });
      function animate() {
        dots.forEach((dot, i) => {
          const targetX = i === 0 ? mouseX : dots[i - 1].x;
          const targetY = i === 0 ? mouseY : dots[i - 1].y;
          dot.x += (targetX - dot.x) * (0.35 - i * 0.04);
          dot.y += (targetY - dot.y) * (0.35 - i * 0.04);
          dot.el.style.left = dot.x + "px";
          dot.el.style.top = dot.y + "px";
          dot.el.style.opacity = 0.7 - i * 0.1;
          dot.el.style.width = (8 - i) + "px";
          dot.el.style.height = (8 - i) + "px";
        });
        requestAnimationFrame(animate);
      }
      animate();
      document.addEventListener("mouseleave", () => { cursor.style.opacity = "0"; });
      document.addEventListener("mouseenter", () => { cursor.style.opacity = "1"; });
    }

    function initParticles() {
      const canvas = document.getElementById("particleCanvas");
      const ctx = canvas.getContext("2d");
      // 限制最高 2 倍 DPR，兼顾清晰度与性能
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      let cssW = window.innerWidth, cssH = window.innerHeight;
      function resize() {
        cssW = window.innerWidth;
        cssH = window.innerHeight;
        canvas.width = Math.floor(cssW * dpr);
        canvas.height = Math.floor(cssH * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resize();
      window.addEventListener("resize", resize);
      const particles = [];
      for (let i = 0; i < 40; i++) {
        particles.push({
          x: Math.random() * cssW,
          y: Math.random() * cssH,
          r: Math.random() * 3 + 1,
          vx: (Math.random() - 0.5) * 0.3,
          vy: -Math.random() * 0.4 - 0.1,
          opacity: Math.random() * 0.15 + 0.05
        });
      }
      function draw() {
        ctx.clearRect(0, 0, cssW, cssH);
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          if (p.y < -10) { p.y = cssH + 10; p.x = Math.random() * cssW; }
          if (p.x < -10) p.x = cssW + 10;
          if (p.x > cssW + 10) p.x = -10;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(45, 212, 191, ${p.opacity})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      draw();
    }
  </script>
</body>

</html>
